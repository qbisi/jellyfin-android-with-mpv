name: App / Publish prerelease

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic prerelease version without the v prefix
        required: true
        default: 0.1.0-rc.1
        type: string

permissions:
  contents: write

concurrency:
  group: prerelease-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-24.04
    env:
      JELLYFIN_VERSION: ${{ inputs.version }}
      ANDROID_NDK_VERSION: 30.0.14904198
      ANDROID_CMAKE_VERSION: 4.1.2
    steps:
      - name: Validate version
        shell: bash
        run: |
          if [[ ! "$JELLYFIN_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-[A-Za-z0-9-]+\.[0-9]+$ ]]; then
            echo "Expected a semantic prerelease such as 0.1.0-rc.1" >&2
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Install Android build tools
        shell: bash
        run: |
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;$ANDROID_NDK_VERSION" \
            "cmake;$ANDROID_CMAKE_VERSION"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Verify
        run: ./gradlew test detekt lint

      - name: Stop verification daemon
        run: ./gradlew --stop

      - name: Build prerelease
        run: ./gradlew assembleLibreDebug assembleLibreRelease versionTxt

      - name: Prepare prerelease files
        shell: bash
        run: |
          mkdir -p build/prerelease
          cp app/build/outputs/apk/libre/debug/*-libre-debug.apk \
            "build/prerelease/jellyfin-android-v${JELLYFIN_VERSION}-libre-debug.apk"
          cp app/build/version.txt build/prerelease/version.txt
          cd build/prerelease
          sha256sum ./* > SHA256SUMS

      - name: Upload build artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: jellyfin-android-v${{ inputs.version }}
          retention-days: 14
          if-no-files-found: error
          path: build/prerelease/

      - name: Publish GitHub prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${JELLYFIN_VERSION}"
          title="Jellyfin Android ${tag}"
          notes="Prerelease build from ${GITHUB_SHA}. The Libre Debug APK is signed with the standard Android debug key for testing."

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" build/prerelease/* --clobber
            gh release edit "$tag" --prerelease --title "$title" --notes "$notes"
          else
            gh release create "$tag" build/prerelease/* \
              --target "$GITHUB_SHA" \
              --prerelease \
              --title "$title" \
              --notes "$notes"
          fi
